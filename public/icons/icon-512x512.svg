  </defs>
  <rect width="512" height="512" rx="112.64" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="215.04" fill="none" stroke="url(#accent)" stroke-width="7.68" opacity="0.3"/>
  <circle cx="256" cy="256" r="150.528" fill="none" stroke="url(#accent)" stroke-width="5.12" opacity="0.15"/>
  <text x="256" y="267.3" font-family="system-ui, -apple-system, sans-serif" font-size="113" font-weight="900" fill="url(#accent)" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)" letter-spacing="5.12">SQ</text>
  <text x="256" y="346.4" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" text-anchor="middle" opacity="0.7" letter-spacing="10.24">SQUAD</text>
</svg>