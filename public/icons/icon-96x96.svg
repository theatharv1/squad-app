<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C29"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.88" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="96" height="96" rx="21.12" fill="url(#bg)"/>
  <circle cx="48" cy="48" r="40.32" fill="none" stroke="url(#accent)" stroke-width="1.44" opacity="0.3"/>
  <circle cx="48" cy="48" r="28.223999999999997" fill="none" stroke="url(#accent)" stroke-width="0.96" opacity="0.15"/>
  <text x="48" y="50.1" font-family="system-ui, -apple-system, sans-serif" font-size="21" font-weight="900" fill="url(#accent)" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)" letter-spacing="0.96">SQ</text>
  <text x="48" y="64.8" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="600" fill="#FFFFFF" text-anchor="middle" opacity="0.7" letter-spacing="1.92">SQUAD</text>
</svg>