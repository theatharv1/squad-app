<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C29"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.84" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28.16" fill="url(#bg)"/>
  <circle cx="64" cy="64" r="53.76" fill="none" stroke="url(#accent)" stroke-width="1.92" opacity="0.3"/>
  <circle cx="64" cy="64" r="37.632" fill="none" stroke="url(#accent)" stroke-width="1.28" opacity="0.15"/>
  <text x="64" y="66.8" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="url(#accent)" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)" letter-spacing="1.28">SQ</text>
  <text x="64" y="86.4" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#FFFFFF" text-anchor="middle" opacity="0.7" letter-spacing="2.56">SQUAD</text>
</svg>