<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C29"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="72" height="72" rx="15.84" fill="url(#bg)"/>
  <circle cx="36" cy="36" r="30.24" fill="none" stroke="url(#accent)" stroke-width="1.08" opacity="0.3"/>
  <circle cx="36" cy="36" r="21.168" fill="none" stroke="url(#accent)" stroke-width="0.72" opacity="0.15"/>
  <text x="36" y="37.6" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="900" fill="url(#accent)" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)" letter-spacing="0.72">SQ</text>
  <text x="36" y="48.8" font-family="system-ui, -apple-system, sans-serif" font-size="5" font-weight="600" fill="#FFFFFF" text-anchor="middle" opacity="0.7" letter-spacing="1.44">SQUAD</text>
</svg>